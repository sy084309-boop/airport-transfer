<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>火鍋店 3D 走覽 · Remy</title>
<style>
*{margin:0;padding:0}body{overflow:hidden;background:#000;font-family:'Microsoft JhengHei',sans-serif;touch-action:none}
#info{position:absolute;top:15px;left:15px;color:#F5F0E8;z-index:10;background:rgba(0,0,0,.75);padding:10px 14px;border-radius:8px;border-left:3px solid #C43A31;pointer-events:none}
#info h2{color:#C43A31;font-size:16px;margin-bottom:2px}#info p{font-size:11px;color:#889}
#hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;z-index:10;font-size:12px;background:rgba(0,0,0,.7);padding:8px 16px;border-radius:20px;pointer-events:none;animation:fade 3s forwards}
@keyframes fade{0%,60%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="info"><h2>🏗️ 火鍋店 3D 走覽</h2><p>45坪·30席·台式復古</p></div>
<div id="hint">👆 單指旋轉 · 🤌 雙指縮放 · 👆👆 雙指平移</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a1a);
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.5,50);
camera.position.set(0,1.6,7);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.target.set(0,1.2,0);controls.enableDamping=true;controls.dampingFactor=.1;
controls.minDistance=2;controls.maxDistance=12;controls.maxPolarAngle=Math.PI/2;

// Lighting
scene.add(new THREE.AmbientLight(0xffd8a0,0.5));
const dl=new THREE.DirectionalLight(0xffeedd,1.2);dl.position.set(3,6,4);scene.add(dl);

// Floor
const floor=new THREE.Mesh(new THREE.PlaneGeometry(14,10),new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:.9}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

// Decorative tiles
[1.5,0,-1.5,-3,-4.5].forEach(z=>{[-5,-2.5,0,2.5,5].forEach(x=>{
  const t=new THREE.Mesh(new THREE.PlaneGeometry(.35,.35),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random()*.1+.05,.3,.3),roughness:.6}));
  t.rotation.x=-Math.PI/2;t.position.set(x,-.001,z);scene.add(t);
})});

// Back wall (kitchen)
[new THREE.BoxGeometry(14,2.8,.25)].forEach(g=>{
  const w=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x2a1a1a,roughness:.85}));
  w.position.set(0,1.4,-4.85);scene.add(w);
});
// Pass window
const pw=new THREE.Mesh(new THREE.BoxGeometry(2,.7,.3),new THREE.MeshStandardMaterial({color:0xc43a31,roughness:.5,emissive:0x330000,emissiveIntensity:.6}));
pw.position.set(0,1.6,-4.7);scene.add(pw);

// Side walls - brick texture
function makeBrickWall(x,rz){
  const w=new THREE.Mesh(new THREE.BoxGeometry(.25,2.8,10),new THREE.MeshStandardMaterial({color:0x3a1a1a,roughness:.9}));
  w.position.set(x,1.4,0);scene.add(w);
  // Brick lines
  for(let y=.2;y<2.8;y+=.24)for(let z=-4.5;z<4.5;z+=.52){
    const l=new THREE.Mesh(new THREE.BoxGeometry(.04,.2,.48),new THREE.MeshStandardMaterial({color:0x1a0a0a}));
    l.position.set(x+.12,y,z+Math.random()*.08);scene.add(l);
}}
makeBrickWall(7);makeBrickWall(-7);

// Neon sign on right wall
(function(){
  const c=document.createElement('canvas');c.width=256;c.height=64;
  const ctx=c.getContext('2d');ctx.fillStyle='#C43A31';ctx.font='bold 50px serif';
  ctx.shadowColor='#C43A31';ctx.shadowBlur=15;ctx.fillText('火 鍋',20,45);
  const tex=new THREE.CanvasTexture(c);
  const s=new THREE.Mesh(new THREE.PlaneGeometry(2.5,.62),new THREE.MeshBasicMaterial({map:tex,transparent:true}));
  s.position.set(6.8,2.2,2);s.rotation.y=-Math.PI/2;scene.add(s);
  const gl=new THREE.PointLight(0xc43a31,.8,3);gl.position.set(6.5,2.2,2);scene.add(gl);
})();

// Tables
function table(x,z,seats=2){
  const g=new THREE.Group();
  // Legs
  [ [-.4,.3],[.4,.3],[-.4,-.3],[.4,-.3] ].forEach(([lx,lz])=>{
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.7,6),new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:.7})));
    g.children[g.children.length-1].position.set(lx,.35,lz);
  });
  // Top - 磨石子
  const top=new THREE.Mesh(new THREE.BoxGeometry(.95,.05,.65),new THREE.MeshStandardMaterial({color:0x4a3830,roughness:.5}));
  top.position.y=.72;g.add(top);
  // Hot pot
  g.add((()=>{const p=new THREE.Mesh(new THREE.CylinderGeometry(.16,.14,.12,12),new THREE.MeshStandardMaterial({color:0x222,roughness:.3,metalness:.9}));p.position.y=.82;return p})());
  // Broth
  g.add((()=>{const b=new THREE.Mesh(new THREE.CylinderGeometry(.14,.13,.04,12),new THREE.MeshStandardMaterial({color:0x8a2020,emissive:0x220000,emissiveIntensity:.3}));b.position.y=.9;return b})());
  // Chairs
  for(let c=0;c<seats;c++){
    const ch=new THREE.Mesh(new THREE.BoxGeometry(.32,.04,.32),new THREE.MeshStandardMaterial({color:0x2a2018,roughness:.7}));
    ch.position.set((c%2?.5:-.5),.45,(c<2?.35:-.35));g.add(ch);
  }
  g.position.set(x,0,z);scene.add(g);
}

// Table layout: 15 tables
const tables=[
  [-5.5,3.8],[-3,3.8],[-.5,3.8],[2,3.8],[4.5,3.8],
  [-5.5,2],[-3,2],[-.5,2],[2,2],[4.5,2],
  [-5.5,.2],[-3,.2],[-.5,.2],[2,.2],[4.5,.2],
  [4,-2,4],[4,-4,4]
];
tables.forEach(t=>table(...t));

// Sauce bar
(function(){
  const bar=new THREE.Mesh(new THREE.BoxGeometry(.8,1,5),new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:.6}));
  bar.position.set(6,0.5,0.5);scene.add(bar);
  // Tile back
  const tb=new THREE.Mesh(new THREE.BoxGeometry(.04,1.2,5),new THREE.MeshStandardMaterial({color:0x2a3a2a,roughness:.5}));
  tb.position.set(6.38,1.2,.5);scene.add(tb);
  for(let i=0;i<6;i++){
    const b=new THREE.Mesh(new THREE.CylinderGeometry(.08,.06,.05,6),new THREE.MeshStandardMaterial({color:0xddd}));
    b.position.set(6.25,1.05,-1.8+i*.75);scene.add(b);
  }
  scene.add(new THREE.PointLight(0xffd8a0,1.2,3)).position.set(6,2.2,.5);
})();

// Track lights
for(let lx=-5;lx<=5;lx+=2.2){
  scene.add(new THREE.PointLight(0xffe0b0,.5,2.5)).position.set(lx,2.55,0);
}

// Ceiling
const ceil=new THREE.Mesh(new THREE.PlaneGeometry(14,10),new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:1}));
ceil.rotation.x=Math.PI/2;ceil.position.y=2.8;scene.add(ceil);

// Animation loop
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
</script>
</body>
</html>
